<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sample Quiz</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 24px;
      line-height: 1.6;
    }
    .card {
      max-width: 820px;
      margin: 0 auto;
      padding: 20px 22px;
      border: 1px solid #ddd;
      border-radius: 12px;
    }
    h1 {
      font-size: 26px;
      margin: 0 0 6px;
    }
    .underline {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      margin: 0 0 14px;
    }
    .desc {
      margin: 0 0 16px;
    }
    .desc div {
      margin: 2px 0;
    }
    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 10px;
    }
    button {
      appearance: none;
      border: 1px solid #ddd;
      background: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover {
      border-color: #bbb;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Sample Quiz</h1>
    <div class="underline">================</div>

    <div class="desc">
      <div><strong>Normal Window</strong> : Toolbar is visible</div>
    </div>

    <div class="btns">
      <button onclick="window.open('https://nolonnevereven.github.io/ScreenshotToAI/misc/sample-quiz01.html','_blank')">
        Open Normal Window
      </button>
    </div>

    <p></p>

    <div class="desc">
      <div><strong>Abnormal Window</strong> : Toolbar is hidden</div>
    </div>
    <div class="btns">
      <button onclick="window.open('https://nolonnevereven.github.io/ScreenshotToAI/misc/sample-quiz02.html','','width=800,height=600,menubar=no,toolbar=no')">
        Open Abnormal Window
      </button>
    </div>
  </main>
</body>
</html>
