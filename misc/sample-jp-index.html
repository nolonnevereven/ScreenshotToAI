<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sample Quiz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 46px 24px 24px; /* top: toolbar(42px) + 4px buffer */
    }

    .card {
      width: 100%;
      max-width: 620px;
      background: #fff;
      border: 2px solid #333;
      border-radius: 4px;
      overflow: hidden;
    }

    .card-header {
      background: #333;
      color: #fff;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
    }
    .badge {
      display: inline-block;
      background: #e8f5e9;
      border: 2px solid #388e3c;
      border-radius: 8px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: bold;
      color: #1b5e20;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .card-header h1 {
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 0.05em;
    }

    .card-body {
      padding: 28px 32px 24px;
    }

    .intro {
      font-size: 14px;
      color: #555;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .section {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 16px 20px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .section:last-child {
      margin-bottom: 0;
    }

    .section-info {}
    .section-label {
      font-size: 13px;
      font-weight: bold;
      color: #222;
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.green  { background: #388e3c; }
    .status-dot.orange { background: #e65100; }

    .section-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }

    .btn {
      padding: 9px 22px;
      font-size: 14px;
      border: 1.5px solid #bbb;
      border-radius: 4px;
      background: #fff;
      color: #333;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .btn:hover {
      background: #f0f0f0;
      border-color: #999;
    }

    .card-footer {
      border-top: 1px solid #ddd;
      padding: 12px 20px;
      background: #fafafa;
      font-size: 12px;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="card-header">
      <span class="badge">Sample Quiz</span>
      <h1>ウィンドウの種類を選択</h1>
    </div>

    <div class="card-body">
      <p class="intro">
        以下のウィンドウモードを選択して Sample Quiz を開いてください。<br>
        <strong>通常ウィンドウ</strong> はブラウザツールバー（アドレスバー・タブ）が<strong>表示された</strong>状態、
        <strong>異常ウィンドウ</strong> はブラウザツールバーが<strong>非表示</strong>の状態でテストできます。
      </p>

      <div class="section">
        <div class="section-info">
          <div class="section-label">
            <span class="status-dot green"></span>
            通常ウィンドウ
          </div>
          <div class="section-desc">通常のタブで開きます — ブラウザツールバー（アドレスバー・タブ）が表示されます。</div>
        </div>
        <button class="btn"
          onclick="window.open('https://nolonnevereven.github.io/ScreenshotToAI/misc/sample-jp-quiz01.html','_blank')">
          開く
        </button>
      </div>

      <div class="section">
        <div class="section-info">
          <div class="section-label">
            <span class="status-dot orange"></span>
            異常ウィンドウ
          </div>
          <div class="section-desc">ポップアップで開きます — ブラウザツールバー（アドレスバー・タブ）が非表示になります。</div>
        </div>
        <button class="btn"
          onclick="window.open('https://nolonnevereven.github.io/ScreenshotToAI/misc/sample-jp-quiz02.html','','width=900,height=600,menubar=no,toolbar=no')">
          開く
        </button>
      </div>
    </div>

    <div class="card-footer">
      Screenshot to AI &nbsp;·&nbsp; Sample Quiz
    </div>

  </div>
</body>
</html>
