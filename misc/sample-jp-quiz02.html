<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>サンプルクイズ</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; margin: 24px; line-height: 1.6; }
    .card { max-width: 820px; margin: 0 auto; padding: 20px 22px; border: 1px solid #ddd; border-radius: 12px; }
    h1 { font-size: 20px; margin: 0 0 12px; }

    .notice { font-weight: 700; color: #1a73e8; margin: 0 0 14px; }
    .notice .hot { color: #d93025; font-weight: 700; display: block; margin: 6px 0; }

    .q { font-size: 16px; margin: 0 0 14px; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { padding: 10px 12px; border: 1px solid #eee; border-radius: 10px; margin: 10px 0; }
    .choice { font-weight: 700; margin-right: 8px; }
  </style>
</head>
<body>
  <main class="card">
    <p class="notice">
      通常のブラウザウィンドウでツールバーが表示されていない場合は、別のタブの上で右クリックし、
      <span class="hot">[ 右クリック → ツールバーを表示 ]</span>
      を選ぶと、画面上部にツールバーが表示されます。
    </p>

    <h1>[ サンプルクイズ ]</h1>

    <p class="q">
      次のうち、従来の機械学習と比べたときのディープラーニングの利点を最も適切に説明しているものはどれですか。
    </p>

    <ul>
      <li><span class="choice">A.</span> 少量のデータしかなくても高い精度を達成できる。</li>
      <li><span class="choice">B.</span> 手作業による特徴量設計を必要としない。</li>
      <li><span class="choice">C.</span> ごく少ない計算資源しか必要としない。</li>
      <li><span class="choice">D.</span> 常に高い解釈性を持つ。</li>
    </ul>
  </main>
</body>
</html>
